org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
## Workaround Kotlin daemon/incremental cache issues seen during plugin compilation
# Disable incremental compilation to avoid persistent cache close errors
kotlin.incremental=false
# Also disable classpath snapshotting which can trigger similar issues
kotlin.incremental.useClasspathSnapshot=false
# Run Kotlin compiler in-process instead of via daemon
kotlin.compiler.execution.strategy=in-process
